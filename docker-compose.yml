version: '3.8'
 
services:
  postgres:
    image: postgres:16-alpine
    container_name: health-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: healthpass
      POSTGRES_DB: healthagent
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
 
volumes:
  postgres_data: